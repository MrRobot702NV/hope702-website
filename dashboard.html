<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOPE 702 — Demand Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* Login */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 70%);
    }
    .login-card {
      background: #12121e;
      border: 1px solid #2d2d44;
      border-radius: 16px;
      padding: 48px 40px;
      width: 360px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    }
    .login-logo {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f97316, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }
    .login-subtitle {
      color: #64748b;
      font-size: 0.85rem;
      margin-bottom: 32px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .login-label {
      display: block;
      text-align: left;
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .login-input {
      width: 100%;
      background: #0a0a0f;
      border: 1px solid #2d2d44;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 1rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    .login-input:focus { border-color: #f97316; }
    .login-input.error { border-color: #ef4444; animation: shake 0.3s ease; }
    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #f97316, #ef4444);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      padding: 13px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }
    .login-error {
      color: #ef4444;
      font-size: 0.82rem;
      margin-top: 10px;
      min-height: 18px;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)}
      60%{transform:translateX(6px)}
    }

    /* Dashboard */
    #dashboard { display: none; }
    #dashboard.visible { display: block; }

    .dash-header {
      background: #12121e;
      border-bottom: 1px solid #1e1e30;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .dash-logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f97316, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .dash-title { color: #94a3b8; font-size: 0.85rem; margin-top: 2px; }
    .dash-meta { text-align: right; color: #475569; font-size: 0.78rem; line-height: 1.6; }

    .dash-body { padding: 24px 28px; }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #12121e;
      border: 1px solid #1e1e30;
      border-radius: 12px;
      padding: 18px 20px;
    }
    .stat-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #475569;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }
    .stat-sub { font-size: 0.78rem; color: #64748b; margin-top: 4px; }
    .c-red    { color: #ef4444; }
    .c-orange { color: #f97316; }
    .c-yellow { color: #eab308; }
    .c-green  { color: #22c55e; }
    .c-white  { color: #f1f5f9; }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .panel {
      background: #12121e;
      border: 1px solid #1e1e30;
      border-radius: 12px;
      padding: 20px;
    }
    .panel-title {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 16px;
    }

    .map-wrap { position: relative; }
    .map-tooltip {
      position: absolute;
      background: #1e1e30;
      border: 1px solid #2d2d44;
      border-radius: 8px;
      padding: 10px 14px;
      pointer-events: none;
      font-size: 0.82rem;
      line-height: 1.6;
      z-index: 10;
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      transform: translate(12px, -50%);
    }
    .map-tooltip-zip { font-weight: 700; font-size: 1rem; }
    .map-tooltip-count { font-size: 1.1rem; font-weight: 800; }

    .legend {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: #94a3b8;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .table-panel { background: #12121e; border: 1px solid #1e1e30; border-radius: 12px; padding: 20px; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #475569;
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid #1e1e30;
    }
    tbody tr { border-bottom: 1px solid #12121e; cursor: default; transition: background 0.15s; }
    tbody tr:hover { background: #1a1a2e; }
    tbody td { padding: 10px 12px; font-size: 0.88rem; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .badge-red    { background: rgba(239,68,68,0.15);  color: #ef4444; }
    .badge-orange { background: rgba(249,115,22,0.15); color: #f97316; }
    .badge-yellow { background: rgba(234,179,8,0.15);  color: #eab308; }
    .badge-green  { background: rgba(34,197,94,0.15);  color: #22c55e; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #2d2d44; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">HOPE 702</div>
      <div class="login-subtitle">Partner Dashboard</div>
      <label class="login-label">Password</label>
      <input id="pw-input" class="login-input" type="password" placeholder="Enter password" />
      <button class="login-btn" onclick="tryLogin()">Access Dashboard</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <div id="dashboard">
    <div id="react-root"></div>
  </div>

  <script>
    document.getElementById('pw-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') tryLogin();
    });

    function tryLogin() {
      var val = document.getElementById('pw-input').value;
      var inp = document.getElementById('pw-input');
      var err = document.getElementById('login-error');
      if (val === 'hope702miguel') {
        document.getElementById('login-screen').style.display = 'none';
        var dash = document.getElementById('dashboard');
        dash.classList.add('visible');
        if (!dash._mounted) {
          dash._mounted = true;
          ReactDOM.createRoot(document.getElementById('react-root')).render(
            React.createElement(Dashboard)
          );
        }
      } else {
        inp.classList.add('error');
        err.textContent = 'Incorrect password.';
        setTimeout(function() { inp.classList.remove('error'); }, 400);
      }
    }
  </script>

  <script>
    var ce = React.createElement;

    var RC = Recharts;
    var BarChart = RC.BarChart;
    var Bar = RC.Bar;
    var XAxis = RC.XAxis;
    var YAxis = RC.YAxis;
    var CartesianGrid = RC.CartesianGrid;
    var RechartTooltip = RC.Tooltip;
    var Cell = RC.Cell;
    var ResponsiveContainer = RC.ResponsiveContainer;

    var ZIP_DATA = [
      { zip: '89106', neighborhood: 'Historic Westside', count: 52 },
      { zip: '89101', neighborhood: 'Downtown',          count: 47 },
      { zip: '89109', neighborhood: 'The Strip Area',    count: 41 },
      { zip: '89104', neighborhood: 'East Fremont',      count: 38 },
      { zip: '89119', neighborhood: 'University',        count: 35 },
      { zip: '89102', neighborhood: 'West Charleston',   count: 31 },
      { zip: '89107', neighborhood: 'Rancho',            count: 29 },
      { zip: '89121', neighborhood: 'Boulder Hwy',       count: 26 },
      { zip: '89108', neighborhood: 'N LV Blvd',         count: 22 },
      { zip: '89110', neighborhood: 'East LV',           count: 18 },
      { zip: '89115', neighborhood: 'North Nellis',      count: 14 },
      { zip: '89146', neighborhood: 'Spring Valley',     count: 12 },
      { zip: '89128', neighborhood: 'Summerlin',         count:  9 }
    ];

    var MAP_POSITIONS = {
      '89101': { x: 298, y: 195 },
      '89106': { x: 253, y: 172 },
      '89109': { x: 258, y: 248 },
      '89104': { x: 348, y: 202 },
      '89119': { x: 300, y: 310 },
      '89102': { x: 220, y: 228 },
      '89107': { x: 196, y: 168 },
      '89121': { x: 405, y: 316 },
      '89108': { x: 286, y: 115 },
      '89110': { x: 452, y: 232 },
      '89115': { x: 420, y: 108 },
      '89146': { x: 128, y: 242 },
      '89128': { x:  55, y: 165 }
    };

    function urgency(count) {
      if (count >= 45) return { level: 'Critical', color: '#ef4444', badge: 'badge-red',    cls: 'c-red'    };
      if (count >= 30) return { level: 'High',     color: '#f97316', badge: 'badge-orange', cls: 'c-orange' };
      if (count >= 20) return { level: 'Moderate', color: '#eab308', badge: 'badge-yellow', cls: 'c-yellow' };
      return               { level: 'Low',      color: '#22c55e', badge: 'badge-green',  cls: 'c-green'  };
    }

    function CustomTooltip(props) {
      var active = props.active;
      var payload = props.payload;
      if (!active || !payload || !payload.length) return null;
      var d = payload[0].payload;
      var u = urgency(d.count);
      return ce('div', { style: { background:'#1e1e30', border:'1px solid #2d2d44', borderRadius:8, padding:'10px 14px' } },
        ce('div', { style: { color:'#e2e8f0', fontWeight:700 } }, d.neighborhood),
        ce('div', { style: { color:'#64748b', fontSize:'0.78rem' } }, d.zip),
        ce('div', { style: { color:u.color, fontSize:'1.2rem', fontWeight:800, marginTop:4 } }, d.count + ' requests'),
        ce('div', { style: { color:u.color, fontSize:'0.72rem', textTransform:'uppercase', letterSpacing:1 } }, u.level)
      );
    }

    function Dashboard() {
      var hoverState   = React.useState(null);
      var hovered      = hoverState[0];
      var setHovered   = hoverState[1];

      var tipPosState  = React.useState({ x: 0, y: 0 });
      var tooltipPos   = tipPosState[0];
      var setTooltipPos = tipPosState[1];

      var selState     = React.useState(null);
      var selected     = selState[0];
      var setSelected  = selState[1];

      var mapRef = React.useRef(null);

      var total    = ZIP_DATA.reduce(function(s, d) { return s + d.count; }, 0);
      var critical = ZIP_DATA.filter(function(d) { return d.count >= 45; }).length;
      var topZip   = ZIP_DATA[0];
      var now      = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      var sortedBar = ZIP_DATA.slice().sort(function(a, b) { return b.count - a.count; });

      function handleMapHover(e, d) {
        if (!mapRef.current) return;
        var rect = mapRef.current.getBoundingClientRect();
        setHovered(d);
        setTooltipPos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
      }

      // ── Header ─────────────────────────────────────────────────────────────
      var header = ce('div', { className: 'dash-header' },
        ce('div', null,
          ce('div', { className: 'dash-logo' }, 'HOPE 702'),
          ce('div', { className: 'dash-title' }, 'Demand Dashboard \u2014 Las Vegas ZIP Code Analysis')
        ),
        ce('div', { className: 'dash-meta' },
          ce('div', null, 'Last updated: ' + now),
          ce('div', null, 'Source: SMS request logs \u00b7 zip_requests.csv')
        )
      );

      // ── Stat cards ─────────────────────────────────────────────────────────
      var statRow = ce('div', { className: 'stat-row' },
        ce('div', { className: 'stat-card' },
          ce('div', { className: 'stat-label' }, 'Total Requests'),
          ce('div', { className: 'stat-value c-white' }, String(total)),
          ce('div', { className: 'stat-sub' }, 'across ' + ZIP_DATA.length + ' ZIP codes')
        ),
        ce('div', { className: 'stat-card' },
          ce('div', { className: 'stat-label' }, 'Critical Zones'),
          ce('div', { className: 'stat-value c-red' }, String(critical)),
          ce('div', { className: 'stat-sub' }, '45+ requests (\u226545)')
        ),
        ce('div', { className: 'stat-card' },
          ce('div', { className: 'stat-label' }, 'Highest Demand'),
          ce('div', { className: 'stat-value c-orange' }, topZip.zip),
          ce('div', { className: 'stat-sub' }, topZip.neighborhood + ' \u00b7 ' + topZip.count + ' requests')
        ),
        ce('div', { className: 'stat-card' },
          ce('div', { className: 'stat-label' }, 'Avg per ZIP'),
          ce('div', { className: 'stat-value c-yellow' }, (total / ZIP_DATA.length).toFixed(1)),
          ce('div', { className: 'stat-sub' }, 'requests per area')
        )
      );

      // ── SVG map circles ────────────────────────────────────────────────────
      var mapCircles = ZIP_DATA.map(function(d) {
        var pos  = MAP_POSITIONS[d.zip];
        var u    = urgency(d.count);
        var isHov = hovered && hovered.zip === d.zip;
        var isSel = selected && selected.zip === d.zip;
        var r    = 6 + Math.sqrt(d.count) * 1.4;
        var children = [];
        if (isHov || isSel) {
          children.push(ce('circle', { key: 'ring', cx: pos.x, cy: pos.y, r: r + 6,
            fill: 'none', stroke: u.color, strokeWidth: 1.5, opacity: 0.4 }));
        }
        children.push(ce('circle', { key: 'dot', cx: pos.x, cy: pos.y, r: r,
          fill: u.color, opacity: (isHov || isSel) ? 1 : 0.75,
          stroke: (isHov || isSel) ? '#fff' : 'none', strokeWidth: 1.5 }));
        children.push(ce('text', { key: 'cnt', x: pos.x, y: pos.y + 1,
          fontSize: 8, fill: '#000', textAnchor: 'middle', dominantBaseline: 'middle',
          fontWeight: 700, style: { pointerEvents: 'none' } }, String(d.count)));
        children.push(ce('text', { key: 'zip', x: pos.x, y: pos.y + r + 11,
          fontSize: 8.5, fill: '#94a3b8', textAnchor: 'middle',
          style: { pointerEvents: 'none' } }, d.zip));
        return ce('g', {
          key: d.zip,
          style: { cursor: 'pointer' },
          onMouseMove: function(e) { handleMapHover(e, d); },
          onMouseLeave: function() { setHovered(null); },
          onClick: function() { setSelected(isSel ? null : d); }
        }, children);
      });

      // ── SVG ────────────────────────────────────────────────────────────────
      var vGridLines = [100,200,300,400].map(function(x) {
        return ce('line', { key: 'v'+x, x1:x, y1:0, x2:x, y2:380, stroke:'#1a1a2e', strokeWidth:1 });
      });
      var hGridLines = [76,152,228,304].map(function(y) {
        return ce('line', { key: 'h'+y, x1:0, y1:y, x2:500, y2:y, stroke:'#1a1a2e', strokeWidth:1 });
      });

      var svgEl = ce('svg', { viewBox: '0 0 500 380', width: '100%', style: { display: 'block' } },
        ce('rect', { width: 500, height: 380, fill: '#0d0d1a', rx: 8 }),
        vGridLines,
        hGridLines,
        ce('text', { x: 480, y: 22, fontSize: 11, fill: '#2d2d44', textAnchor: 'middle' }, 'N'),
        ce('line', { x1: 480, y1: 26, x2: 480, y2: 34, stroke: '#2d2d44', strokeWidth: 1.5 }),
        ce('text', { x: 258, y: 340, fontSize: 9, fill: '#1e2a44', textAnchor: 'middle', fontStyle: 'italic' }, 'The Strip'),
        mapCircles
      );

      // ── Hover tooltip ──────────────────────────────────────────────────────
      var mapTooltip = hovered ? ce('div', {
        className: 'map-tooltip',
        style: { left: tooltipPos.x, top: tooltipPos.y }
      },
        ce('div', { className: 'map-tooltip-zip', style: { color: urgency(hovered.count).color } }, hovered.zip),
        ce('div', { style: { color: '#cbd5e1' } }, hovered.neighborhood),
        ce('div', { className: 'map-tooltip-count', style: { color: urgency(hovered.count).color } }, hovered.count + ' requests'),
        ce('div', { style: { color: '#64748b', fontSize: '0.72rem', textTransform: 'uppercase', letterSpacing: 1 } }, urgency(hovered.count).level)
      ) : null;

      // ── Legend ─────────────────────────────────────────────────────────────
      var legendItems = [
        ['#ef4444','Critical (45+)'],
        ['#f97316','High (30\u201344)'],
        ['#eab308','Moderate (20\u201329)'],
        ['#22c55e','Low (<20)']
      ].map(function(pair) {
        return ce('div', { key: pair[0], className: 'legend-item' },
          ce('div', { className: 'legend-dot', style: { background: pair[0] } }),
          pair[1]
        );
      });

      // ── Map panel ─────────────────────────────────────────────────────────
      var mapPanel = ce('div', { className: 'panel' },
        ce('div', { className: 'panel-title' }, 'Geographic Distribution'),
        ce('div', { className: 'map-wrap', ref: mapRef },
          svgEl,
          mapTooltip
        ),
        ce('div', { className: 'legend' }, legendItems)
      );

      // ── Bar chart ─────────────────────────────────────────────────────────
      var barCells = sortedBar.map(function(d) {
        return ce(Cell, { key: d.zip, fill: urgency(d.count).color, fillOpacity: 0.85 });
      });

      var chartPanel = ce('div', { className: 'panel' },
        ce('div', { className: 'panel-title' }, 'Requests by ZIP Code'),
        ce(ResponsiveContainer, { width: '100%', height: 340 },
          ce(BarChart, { data: sortedBar, layout: 'vertical', margin: { top:0, right:40, bottom:0, left:30 } },
            ce(CartesianGrid, { strokeDasharray: '3 3', stroke: '#1e1e30', horizontal: false }),
            ce(XAxis, { type: 'number', tick: { fill:'#475569', fontSize:11 }, axisLine: false, tickLine: false }),
            ce(YAxis, { type: 'category', dataKey: 'zip', tick: { fill:'#94a3b8', fontSize:11 }, axisLine: false, tickLine: false, width: 44 }),
            ce(RechartTooltip, { content: ce(CustomTooltip), cursor: { fill:'rgba(255,255,255,0.04)' } }),
            ce(Bar, { dataKey: 'count', radius: [0,4,4,0], maxBarSize: 22, label: { position:'right', fontSize:11, fill:'#64748b' } },
              barCells
            )
          )
        )
      );

      // ── Table ─────────────────────────────────────────────────────────────
      var tableRows = ZIP_DATA.map(function(d, i) {
        var u    = urgency(d.count);
        var pct  = ((d.count / total) * 100).toFixed(1);
        var barW = Math.round((d.count / ZIP_DATA[0].count) * 100);
        return ce('tr', { key: d.zip },
          ce('td', { style: { color:'#475569', fontWeight:600 } }, '#' + (i + 1)),
          ce('td', { style: { fontWeight:700, color:u.color } }, d.zip),
          ce('td', { style: { color:'#cbd5e1' } }, d.neighborhood),
          ce('td', { style: { fontWeight:700, color:u.color, fontSize:'1rem' } }, String(d.count)),
          ce('td', { style: { color:'#64748b' } }, pct + '%'),
          ce('td', null, ce('span', { className: 'badge ' + u.badge }, u.level)),
          ce('td', { style: { width:'160px' } },
            ce('div', { style: { background:'#1e1e30', borderRadius:4, height:8, overflow:'hidden' } },
              ce('div', { style: { background:u.color, width:barW+'%', height:'100%', borderRadius:4, opacity:0.8 } })
            )
          )
        );
      });

      var tablePanel = ce('div', { className: 'table-panel' },
        ce('div', { className: 'panel-title', style: { marginBottom:12 } }, 'Neighborhood Breakdown'),
        ce('table', null,
          ce('thead', null,
            ce('tr', null,
              ce('th', null, 'Rank'),
              ce('th', null, 'ZIP Code'),
              ce('th', null, 'Neighborhood'),
              ce('th', null, 'Requests'),
              ce('th', null, 'Share'),
              ce('th', null, 'Urgency'),
              ce('th', null, 'Volume Bar')
            )
          ),
          ce('tbody', null, tableRows)
        )
      );

      // ── Root ──────────────────────────────────────────────────────────────
      return ce('div', null,
        header,
        ce('div', { className: 'dash-body' },
          statRow,
          ce('div', { className: 'main-grid' }, mapPanel, chartPanel),
          tablePanel
        )
      );
    }
  </script>
</body>
</html>

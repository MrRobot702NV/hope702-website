<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOPE 702 — Demand Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Login ─────────────────────────────────────────────────────── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 70%);
    }
    .login-card {
      background: #12121e;
      border: 1px solid #2d2d44;
      border-radius: 16px;
      padding: 48px 40px;
      width: 360px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    }
    .login-logo {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f97316, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }
    .login-subtitle {
      color: #64748b;
      font-size: 0.85rem;
      margin-bottom: 32px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .login-label {
      display: block;
      text-align: left;
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .login-input {
      width: 100%;
      background: #0a0a0f;
      border: 1px solid #2d2d44;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 1rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    .login-input:focus { border-color: #f97316; }
    .login-input.error { border-color: #ef4444; animation: shake 0.3s ease; }
    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #f97316, #ef4444);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      padding: 13px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }
    .login-error {
      color: #ef4444;
      font-size: 0.82rem;
      margin-top: 10px;
      min-height: 18px;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)}
      60%{transform:translateX(6px)}
    }

    /* ── Dashboard layout ──────────────────────────────────────────── */
    #dashboard { display: none; }
    #dashboard.visible { display: block; }

    .dash-header {
      background: #12121e;
      border-bottom: 1px solid #1e1e30;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .dash-logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f97316, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .dash-title { color: #94a3b8; font-size: 0.85rem; margin-top: 2px; }
    .dash-meta { text-align: right; color: #475569; font-size: 0.78rem; line-height: 1.6; }

    .dash-body { padding: 24px 28px; }

    /* ── Stat cards ────────────────────────────────────────────────── */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #12121e;
      border: 1px solid #1e1e30;
      border-radius: 12px;
      padding: 18px 20px;
    }
    .stat-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #475569;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }
    .stat-sub { font-size: 0.78rem; color: #64748b; margin-top: 4px; }
    .c-red    { color: #ef4444; }
    .c-orange { color: #f97316; }
    .c-yellow { color: #eab308; }
    .c-green  { color: #22c55e; }
    .c-white  { color: #f1f5f9; }

    /* ── Main grid ─────────────────────────────────────────────────── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .panel {
      background: #12121e;
      border: 1px solid #1e1e30;
      border-radius: 12px;
      padding: 20px;
    }
    .panel-title {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 16px;
    }

    /* ── SVG Map ───────────────────────────────────────────────────── */
    .map-wrap { position: relative; }
    .map-tooltip {
      position: absolute;
      background: #1e1e30;
      border: 1px solid #2d2d44;
      border-radius: 8px;
      padding: 10px 14px;
      pointer-events: none;
      font-size: 0.82rem;
      line-height: 1.6;
      z-index: 10;
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      transform: translate(12px, -50%);
    }
    .map-tooltip-zip { font-weight: 700; font-size: 1rem; }
    .map-tooltip-count { font-size: 1.1rem; font-weight: 800; }

    /* ── Legend ────────────────────────────────────────────────────── */
    .legend {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: #94a3b8;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    /* ── Neighborhood table ────────────────────────────────────────── */
    .table-panel { background: #12121e; border: 1px solid #1e1e30; border-radius: 12px; padding: 20px; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #475569;
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid #1e1e30;
    }
    tbody tr { border-bottom: 1px solid #12121e; cursor: default; transition: background 0.15s; }
    tbody tr:hover { background: #1a1a2e; }
    tbody td { padding: 10px 12px; font-size: 0.88rem; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .badge-red    { background: rgba(239,68,68,0.15);  color: #ef4444; }
    .badge-orange { background: rgba(249,115,22,0.15); color: #f97316; }
    .badge-yellow { background: rgba(234,179,8,0.15);  color: #eab308; }
    .badge-green  { background: rgba(34,197,94,0.15);  color: #22c55e; }

    .bar-label { font-size: 11px; fill: #94a3b8; }

    /* ── Scrollbar ─────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #2d2d44; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">HOPE 702</div>
      <div class="login-subtitle">Partner Dashboard</div>
      <label class="login-label">Password</label>
      <input id="pw-input" class="login-input" type="password" placeholder="Enter password" />
      <button class="login-btn" onclick="tryLogin()">Access Dashboard</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <div id="dashboard">
    <div id="react-root"></div>
  </div>

  <script>
    document.getElementById('pw-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') tryLogin();
    });

    function tryLogin() {
      const val = document.getElementById('pw-input').value;
      const inp = document.getElementById('pw-input');
      const err = document.getElementById('login-error');
      if (val === 'hope702miguel') {
        document.getElementById('login-screen').style.display = 'none';
        const dash = document.getElementById('dashboard');
        dash.classList.add('visible');
        if (!dash._mounted) {
          dash._mounted = true;
          ReactDOM.createRoot(document.getElementById('react-root')).render(
            React.createElement(Dashboard)
          );
        }
      } else {
        inp.classList.add('error');
        err.textContent = 'Incorrect password.';
        setTimeout(() => inp.classList.remove('error'), 400);
      }
    }
  </script>

  <script type="text/babel">
    const {
      BarChart, Bar, XAxis, YAxis, CartesianGrid,
      Tooltip: RechartTooltip, Cell, ResponsiveContainer
    } = Recharts;

    const ZIP_DATA = [
      { zip: '89106', neighborhood: 'Historic Westside', count: 52 },
      { zip: '89101', neighborhood: 'Downtown',          count: 47 },
      { zip: '89109', neighborhood: 'The Strip Area',    count: 41 },
      { zip: '89104', neighborhood: 'East Fremont',      count: 38 },
      { zip: '89119', neighborhood: 'University',        count: 35 },
      { zip: '89102', neighborhood: 'West Charleston',   count: 31 },
      { zip: '89107', neighborhood: 'Rancho',            count: 29 },
      { zip: '89121', neighborhood: 'Boulder Hwy',       count: 26 },
      { zip: '89108', neighborhood: 'N LV Blvd',         count: 22 },
      { zip: '89110', neighborhood: 'East LV',           count: 18 },
      { zip: '89115', neighborhood: 'North Nellis',      count: 14 },
      { zip: '89146', neighborhood: 'Spring Valley',     count: 12 },
      { zip: '89128', neighborhood: 'Summerlin',         count:  9 },
    ];

    // Approximate SVG positions (500×380 canvas)
    const MAP_POSITIONS = {
      '89101': { x: 298, y: 195 },
      '89106': { x: 253, y: 172 },
      '89109': { x: 258, y: 248 },
      '89104': { x: 348, y: 202 },
      '89119': { x: 300, y: 310 },
      '89102': { x: 220, y: 228 },
      '89107': { x: 196, y: 168 },
      '89121': { x: 405, y: 316 },
      '89108': { x: 286, y: 115 },
      '89110': { x: 452, y: 232 },
      '89115': { x: 420, y: 108 },
      '89146': { x: 128, y: 242 },
      '89128': { x:  55, y: 165 },
    };

    function urgency(count) {
      if (count >= 45) return { level: 'Critical', color: '#ef4444', badge: 'badge-red',    cls: 'c-red'    };
      if (count >= 30) return { level: 'High',     color: '#f97316', badge: 'badge-orange', cls: 'c-orange' };
      if (count >= 20) return { level: 'Moderate', color: '#eab308', badge: 'badge-yellow', cls: 'c-yellow' };
      return               { level: 'Low',      color: '#22c55e', badge: 'badge-green',  cls: 'c-green'  };
    }

    function Dashboard() {
      const [hovered, setHovered] = React.useState(null);
      const [tooltipPos, setTooltipPos] = React.useState({ x: 0, y: 0 });
      const [selected, setSelected] = React.useState(null);
      const mapRef = React.useRef(null);

      const total     = ZIP_DATA.reduce((s, d) => s + d.count, 0);
      const critical  = ZIP_DATA.filter(d => d.count >= 45).length;
      const topZip    = ZIP_DATA[0];
      const now       = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

      const sortedBar = [...ZIP_DATA].sort((a, b) => b.count - a.count);

      function handleMapHover(e, d) {
        if (!mapRef.current) return;
        const rect = mapRef.current.getBoundingClientRect();
        setHovered(d);
        setTooltipPos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
      }

      const CustomTooltip = ({ active, payload }) => {
        if (!active || !payload?.length) return null;
        const d = payload[0].payload;
        const u = urgency(d.count);
        return (
          <div style={{ background:'#1e1e30', border:'1px solid #2d2d44', borderRadius:8, padding:'10px 14px' }}>
            <div style={{ color:'#e2e8f0', fontWeight:700 }}>{d.neighborhood}</div>
            <div style={{ color:'#64748b', fontSize:'0.78rem' }}>{d.zip}</div>
            <div style={{ color: u.color, fontSize:'1.2rem', fontWeight:800, marginTop:4 }}>{d.count} requests</div>
            <div style={{ color: u.color, fontSize:'0.72rem', textTransform:'uppercase', letterSpacing:1 }}>{u.level}</div>
          </div>
        );
      };

      return (
        <div>
          {/* Header */}
          <div className="dash-header">
            <div>
              <div className="dash-logo">HOPE 702</div>
              <div className="dash-title">Demand Dashboard — Las Vegas ZIP Code Analysis</div>
            </div>
            <div className="dash-meta">
              <div>Last updated: {now}</div>
              <div>Source: SMS request logs · zip_requests.csv</div>
            </div>
          </div>

          <div className="dash-body">
            {/* Stat cards */}
            <div className="stat-row">
              <div className="stat-card">
                <div className="stat-label">Total Requests</div>
                <div className="stat-value c-white">{total}</div>
                <div className="stat-sub">across {ZIP_DATA.length} ZIP codes</div>
              </div>
              <div className="stat-card">
                <div className="stat-label">Critical Zones</div>
                <div className="stat-value c-red">{critical}</div>
                <div className="stat-sub">45+ requests (≥45)</div>
              </div>
              <div className="stat-card">
                <div className="stat-label">Highest Demand</div>
                <div className="stat-value c-orange">{topZip.zip}</div>
                <div className="stat-sub">{topZip.neighborhood} · {topZip.count} requests</div>
              </div>
              <div className="stat-card">
                <div className="stat-label">Avg per ZIP</div>
                <div className="stat-value c-yellow">{(total / ZIP_DATA.length).toFixed(1)}</div>
                <div className="stat-sub">requests per area</div>
              </div>
            </div>

            {/* Map + Chart */}
            <div className="main-grid">

              {/* SVG Map */}
              <div className="panel">
                <div className="panel-title">Geographic Distribution</div>
                <div className="map-wrap" ref={mapRef}>
                  <svg viewBox="0 0 500 380" width="100%" style={{ display:'block' }}>
                    {/* Background */}
                    <rect width="500" height="380" fill="#0d0d1a" rx="8" />

                    {/* Subtle grid */}
                    {[100,200,300,400].map(x =>
                      <line key={x} x1={x} y1="0" x2={x} y2="380" stroke="#1a1a2e" strokeWidth="1" />
                    )}
                    {[76,152,228,304].map(y =>
                      <line key={y} x1="0" y1={y} x2="500" y2={y} stroke="#1a1a2e" strokeWidth="1" />
                    )}

                    {/* Compass */}
                    <text x="480" y="22" fontSize="11" fill="#2d2d44" textAnchor="middle">N</text>
                    <line x1="480" y1="26" x2="480" y2="34" stroke="#2d2d44" strokeWidth="1.5" markerEnd="url(#arr)" />

                    {/* Strip label */}
                    <text x="258" y="340" fontSize="9" fill="#1e2a44" textAnchor="middle" fontStyle="italic">The Strip</text>

                    {/* ZIP circles */}
                    {ZIP_DATA.map(d => {
                      const pos = MAP_POSITIONS[d.zip];
                      const u   = urgency(d.count);
                      const isHov = hovered?.zip === d.zip;
                      const isSel = selected?.zip === d.zip;
                      const r = 6 + Math.sqrt(d.count) * 1.4;
                      return (
                        <g key={d.zip}
                           style={{ cursor: 'pointer' }}
                           onMouseMove={e => handleMapHover(e, d)}
                           onMouseLeave={() => setHovered(null)}
                           onClick={() => setSelected(isSel ? null : d)}>
                          {/* Pulse ring on hover/select */}
                          {(isHov || isSel) &&
                            <circle cx={pos.x} cy={pos.y} r={r + 6}
                              fill="none" stroke={u.color} strokeWidth="1.5" opacity="0.4" />
                          }
                          <circle cx={pos.x} cy={pos.y} r={r}
                            fill={u.color} opacity={isHov || isSel ? 1 : 0.75}
                            stroke={isHov || isSel ? '#fff' : 'none'} strokeWidth="1.5" />
                          <text x={pos.x} y={pos.y + 1} fontSize="8" fill="#000"
                            textAnchor="middle" dominantBaseline="middle"
                            fontWeight="700" style={{ pointerEvents:'none' }}>
                            {d.count}
                          </text>
                          <text x={pos.x} y={pos.y + r + 11} fontSize="8.5" fill="#94a3b8"
                            textAnchor="middle" style={{ pointerEvents:'none' }}>
                            {d.zip}
                          </text>
                        </g>
                      );
                    })}
                  </svg>

                  {/* Hover tooltip */}
                  {hovered && (
                    <div className="map-tooltip" style={{ left: tooltipPos.x, top: tooltipPos.y }}>
                      <div className="map-tooltip-zip" style={{ color: urgency(hovered.count).color }}>
                        {hovered.zip}
                      </div>
                      <div style={{ color:'#cbd5e1' }}>{hovered.neighborhood}</div>
                      <div className="map-tooltip-count" style={{ color: urgency(hovered.count).color }}>
                        {hovered.count} requests
                      </div>
                      <div style={{ color:'#64748b', fontSize:'0.72rem', textTransform:'uppercase', letterSpacing:1 }}>
                        {urgency(hovered.count).level}
                      </div>
                    </div>
                  )}
                </div>

                {/* Legend */}
                <div className="legend">
                  {[['#ef4444','Critical (45+)'],['#f97316','High (30–44)'],
                    ['#eab308','Moderate (20–29)'],['#22c55e','Low (<20)']].map(([c,l]) =>
                    <div key={c} className="legend-item">
                      <div className="legend-dot" style={{ background: c }} />
                      {l}
                    </div>
                  )}
                </div>
              </div>

              {/* Bar chart */}
              <div className="panel">
                <div className="panel-title">Requests by ZIP Code</div>
                <ResponsiveContainer width="100%" height={340}>
                  <BarChart data={sortedBar} layout="vertical"
                    margin={{ top: 0, right: 40, bottom: 0, left: 30 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e1e30" horizontal={false} />
                    <XAxis type="number" tick={{ fill:'#475569', fontSize:11 }}
                      axisLine={false} tickLine={false} />
                    <YAxis type="category" dataKey="zip"
                      tick={{ fill:'#94a3b8', fontSize:11 }}
                      axisLine={false} tickLine={false} width={44} />
                    <RechartTooltip content={<CustomTooltip />} cursor={{ fill:'rgba(255,255,255,0.04)' }} />
                    <Bar dataKey="count" radius={[0, 4, 4, 0]} maxBarSize={22}
                      label={{ position:'right', fontSize:11, fill:'#64748b' }}>
                      {sortedBar.map(d =>
                        <Cell key={d.zip} fill={urgency(d.count).color} fillOpacity={0.85} />
                      )}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>

            {/* Neighborhood table */}
            <div className="table-panel">
              <div className="panel-title" style={{ marginBottom:12 }}>
                Neighborhood Breakdown
              </div>
              <table>
                <thead>
                  <tr>
                    <th>Rank</th>
                    <th>ZIP Code</th>
                    <th>Neighborhood</th>
                    <th>Requests</th>
                    <th>Share</th>
                    <th>Urgency</th>
                    <th>Volume Bar</th>
                  </tr>
                </thead>
                <tbody>
                  {ZIP_DATA.map((d, i) => {
                    const u = urgency(d.count);
                    const pct = ((d.count / total) * 100).toFixed(1);
                    const barW = Math.round((d.count / ZIP_DATA[0].count) * 100);
                    return (
                      <tr key={d.zip}>
                        <td style={{ color:'#475569', fontWeight:600 }}>#{i + 1}</td>
                        <td style={{ fontWeight:700, color: u.color }}>{d.zip}</td>
                        <td style={{ color:'#cbd5e1' }}>{d.neighborhood}</td>
                        <td style={{ fontWeight:700, color: u.color, fontSize:'1rem' }}>{d.count}</td>
                        <td style={{ color:'#64748b' }}>{pct}%</td>
                        <td>
                          <span className={`badge ${u.badge}`}>{u.level}</span>
                        </td>
                        <td style={{ width:'160px' }}>
                          <div style={{ background:'#1e1e30', borderRadius:4, height:8, overflow:'hidden' }}>
                            <div style={{
                              background: u.color,
                              width: `${barW}%`,
                              height: '100%',
                              borderRadius: 4,
                              opacity: 0.8
                            }} />
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOPE 702 — Staff Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1B2A4A;
      --bg-dark:  #141F38;
      --bg-light: #243456;
      --gold:     #E5A100;
      --gold-lt:  #F5C842;
      --gold-dim: #C48A00;
      --muted:    #8E9BB5;
      --border:   rgba(255,255,255,0.1);
      --text:     #E8EDF5;
      --text-dim: #B8C4D8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--bg-light); border-radius: 3px; }

    /* ── LOGIN ──────────────────────────────────────────────────────── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 40%, #1E3160 0%, var(--bg-dark) 70%);
    }

    .login-card {
      background: var(--bg-light);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 52px 44px 44px;
      width: 380px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(229,161,0,0.08);
    }

    .logo-lockup {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .logo-hope {
      font-size: 2.4rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.06em;
    }
    .logo-badge {
      background: var(--gold);
      color: var(--bg-dark);
      font-size: 1.15rem;
      font-weight: 900;
      padding: 5px 13px;
      border-radius: 9px;
      letter-spacing: 0.04em;
    }

    .login-tagline {
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 38px;
    }

    .login-label {
      display: block;
      text-align: left;
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }

    .login-input {
      width: 100%;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 16px;
    }
    .login-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(229,161,0,0.15);
    }
    .login-input.shake {
      border-color: #EF4444;
      animation: shake 0.32s ease;
    }

    .login-btn {
      width: 100%;
      background: var(--gold);
      border: none;
      border-radius: 10px;
      color: var(--bg-dark);
      font-size: 1rem;
      font-weight: 800;
      padding: 15px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(229,161,0,0.4);
    }
    .login-btn:hover {
      background: var(--gold-lt);
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(229,161,0,0.5);
    }
    .login-btn:active { transform: translateY(0); }

    .login-error {
      color: #EF4444;
      font-size: 0.78rem;
      margin-top: 10px;
      min-height: 18px;
    }

    .login-auth-note {
      margin-top: 20px;
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.6;
    }

    @keyframes shake {
      0%,100% { transform:translateX(0); }
      18%      { transform:translateX(-7px); }
      54%      { transform:translateX(7px); }
      72%      { transform:translateX(-4px); }
    }

    /* ── DASHBOARD SHELL ─────────────────────────────────────────────── */
    #dashboard { display: none; }
    #dashboard.visible { display: block; }

    .hdr {
      background: var(--bg-dark);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .hdr-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .hdr-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hdr-hope {
      font-size: 1.35rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.05em;
    }
    .hdr-badge {
      background: var(--gold);
      color: var(--bg-dark);
      font-size: 0.7rem;
      font-weight: 900;
      padding: 3px 9px;
      border-radius: 6px;
    }
    .hdr-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
    }
    .hdr-tagline {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .hdr-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .hdr-live {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.75rem;
    }
    .live-dot {
      width: 7px;
      height: 7px;
      background: #22C55E;
      border-radius: 50%;
      box-shadow: 0 0 6px #22C55E;
      animation: pulse-dot 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse-dot {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.5; transform:scale(0.8); }
    }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.78rem;
      padding: 7px 16px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .logout-btn:hover {
      border-color: rgba(255,255,255,0.22);
      color: var(--text);
      background: rgba(255,255,255,0.05);
    }

    /* ── BODY ─────────────────────────────────────────────────────────── */
    .body {
      padding: 28px 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── FILTERS ──────────────────────────────────────────────────────── */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: var(--bg-light);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 7px 20px;
      transition: all 0.15s;
    }
    .filter-btn:hover {
      border-color: rgba(255,255,255,0.2);
      color: var(--text);
    }
    .filter-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg-dark);
    }

    /* ── STAT CARDS ───────────────────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat {
      background: var(--bg-light);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
    }
    .stat::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent, var(--gold));
      border-radius: 14px 14px 0 0;
    }
    .stat-lbl {
      font-size: 0.67rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .stat-val {
      font-size: 2.1rem;
      font-weight: 800;
      line-height: 1;
      color: var(--accent, var(--gold));
    }
    .stat-note {
      font-size: 0.74rem;
      color: var(--muted);
      margin-top: 7px;
    }

    /* ── MAIN GRID ────────────────────────────────────────────────────── */
    .main-grid {
      display: grid;
      grid-template-columns: 1.15fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .panel {
      background: var(--bg-light);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
    }
    .panel-title {
      font-size: 0.67rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── MAP ──────────────────────────────────────────────────────────── */
    .map-wrap { position: relative; }
    .map-tip {
      position: absolute;
      background: var(--bg-dark);
      border: 1px solid rgba(229,161,0,0.25);
      border-radius: 10px;
      padding: 11px 16px;
      pointer-events: none;
      font-size: 0.8rem;
      line-height: 1.7;
      z-index: 20;
      white-space: nowrap;
      box-shadow: 0 10px 28px rgba(0,0,0,0.6);
      transform: translate(14px, -50%);
      display: none;
    }
    .tip-zip   { font-weight: 800; font-size: 1rem; color: var(--gold); }
    .tip-count { font-size: 1.1rem; font-weight: 800; color: var(--gold-lt); }
    .tip-sub   { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; }

    /* ── ZIP LIST ─────────────────────────────────────────────────────── */
    .zip-list {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .zip-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .zip-rank {
      width: 18px;
      font-size: 0.65rem;
      color: var(--muted);
      text-align: right;
      flex-shrink: 0;
    }
    .zip-code {
      width: 46px;
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--gold);
      flex-shrink: 0;
    }
    .zip-bar-wrap {
      flex: 1;
      height: 16px;
      background: var(--bg-dark);
      border-radius: 4px;
      overflow: hidden;
    }
    .zip-bar-fill {
      height: 100%;
      background: linear-gradient(to right, #C48A00, #E5A100);
      border-radius: 4px;
      transition: width 0.6s ease;
    }
    .zip-nbhd {
      width: 100px;
      font-size: 0.68rem;
      color: var(--muted);
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .zip-count {
      width: 28px;
      font-size: 0.74rem;
      font-weight: 700;
      color: var(--gold-lt);
      text-align: right;
      flex-shrink: 0;
    }

    /* ── CATEGORY CHART ───────────────────────────────────────────────── */
    .cat-panel {
      background: var(--bg-light);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
    }
    .cat-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .cat-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .cat-icon {
      width: 26px;
      font-size: 15px;
      text-align: center;
      flex-shrink: 0;
    }
    .cat-label {
      width: 70px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .cat-bar-wrap {
      flex: 1;
      height: 24px;
      background: var(--bg-dark);
      border-radius: 5px;
      overflow: hidden;
    }
    .cat-bar-fill {
      height: 100%;
      border-radius: 5px;
      background: linear-gradient(to right, #C48A00, #F5C842);
      transition: width 0.7s ease;
    }
    .cat-count {
      width: 38px;
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--gold);
      text-align: right;
      flex-shrink: 0;
    }
    .cat-pct {
      width: 38px;
      font-size: 0.7rem;
      color: var(--muted);
      text-align: right;
      flex-shrink: 0;
    }

    /* ── RESPONSIVE ───────────────────────────────────────────────────── */
    @media (max-width: 1024px) {
      .main-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 900px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .body  { padding: 16px; }
      .hdr   { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo-lockup">
      <span class="logo-hope">HOPE</span>
      <span class="logo-badge">702</span>
    </div>
    <div class="login-tagline">Staff Dashboard</div>

    <label class="login-label" for="pw-input">Password</label>
    <input id="pw-input" class="login-input" type="password"
           placeholder="Enter access password" autocomplete="current-password" />
    <button class="login-btn" onclick="tryLogin()">Sign In to Dashboard</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-auth-note">Authorized HELP of Southern Nevada staff only</div>
  </div>
</div>

<!-- ═══════════════ DASHBOARD ═══════════════════════════════════════════════ -->
<div id="dashboard">

  <header class="hdr">
    <div class="hdr-left">
      <div class="hdr-logo">
        <span class="hdr-hope">HOPE</span>
        <span class="hdr-badge">702</span>
      </div>
      <div class="hdr-sep"></div>
      <div class="hdr-tagline">SMS Activity Dashboard &mdash; Las Vegas</div>
    </div>
    <div class="hdr-right">
      <div class="hdr-live">
        <span class="live-dot"></span>
        Live &nbsp;&middot;&nbsp; <span id="hdr-date"></span>
      </div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <main class="body">

    <!-- Filter buttons -->
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('shelter', this)">Shelters</button>
      <button class="filter-btn" onclick="setFilter('food', this)">Food</button>
      <button class="filter-btn" onclick="setFilter('cooling', this)">Cooling</button>
      <button class="filter-btn" onclick="setFilter('water', this)">Water</button>
      <button class="filter-btn" onclick="setFilter('pets', this)">Pets</button>
    </div>

    <!-- Stat cards -->
    <div class="stats">
      <div class="stat" style="--accent:var(--gold)">
        <div class="stat-lbl">Total Texts</div>
        <div class="stat-val" id="s-total">—</div>
        <div class="stat-note" id="s-total-note"></div>
      </div>
      <div class="stat" style="--accent:#4A9EFF">
        <div class="stat-lbl">Active ZIPs</div>
        <div class="stat-val" id="s-zips">—</div>
        <div class="stat-note">Las Vegas area codes</div>
      </div>
      <div class="stat" style="--accent:var(--gold-lt)">
        <div class="stat-lbl">Top Resource</div>
        <div class="stat-val" id="s-top-res" style="font-size:1.35rem">—</div>
        <div class="stat-note" id="s-top-res-note"></div>
      </div>
      <div class="stat" style="--accent:#F97316">
        <div class="stat-lbl">Hottest ZIP</div>
        <div class="stat-val" id="s-hot-zip">—</div>
        <div class="stat-note" id="s-hot-note"></div>
      </div>
    </div>

    <!-- Map + ZIP list -->
    <div class="main-grid">

      <!-- Heatmap -->
      <div class="panel">
        <div class="panel-title">
          SMS Heatmap &mdash; <span id="map-hint" style="color:var(--text-dim);font-weight:400;text-transform:none;letter-spacing:0">hover a dot for details</span>
        </div>
        <div class="map-wrap" id="map-wrap">
          <svg id="map-svg" viewBox="0 0 500 380" width="100%" style="display:block;border-radius:8px"></svg>
          <div class="map-tip" id="map-tip">
            <div class="tip-zip"   id="tip-zip"></div>
            <div style="color:var(--text-dim);font-size:0.75rem" id="tip-nbhd"></div>
            <div class="tip-count" id="tip-count"></div>
            <div class="tip-sub"   id="tip-sub"></div>
          </div>
        </div>
      </div>

      <!-- Top ZIP codes -->
      <div class="panel">
        <div class="panel-title">Top ZIP Codes</div>
        <div class="zip-list" id="zip-list"></div>
      </div>

    </div>

    <!-- Category bar chart -->
    <div class="cat-panel">
      <div class="panel-title">Requests by Category</div>
      <div class="cat-list" id="cat-list"></div>
    </div>

  </main>
</div>

<!-- ═══════════════ SCRIPT ══════════════════════════════════════════════════ -->
<script>
'use strict';

/* ── Sample data ─────────────────────────────────────────────────────────── */
var ZIP_DATA = [
  { zip:'89106', nbhd:'Historic Westside', count:52 },
  { zip:'89101', nbhd:'Downtown',          count:47 },
  { zip:'89109', nbhd:'The Strip Area',    count:41 },
  { zip:'89104', nbhd:'East Fremont',      count:38 },
  { zip:'89119', nbhd:'University',        count:35 },
  { zip:'89102', nbhd:'West Charleston',   count:31 },
  { zip:'89107', nbhd:'Rancho',            count:29 },
  { zip:'89121', nbhd:'Boulder Hwy',       count:26 },
  { zip:'89108', nbhd:'N LV Blvd',         count:22 },
  { zip:'89110', nbhd:'East LV',           count:18 },
  { zip:'89115', nbhd:'North Nellis',      count:14 },
  { zip:'89146', nbhd:'Spring Valley',     count:12 },
  { zip:'89128', nbhd:'Summerlin',         count: 9 },
  { zip:'89004', nbhd:'Blue Diamond',      count: 8 }
];

/* Per-ZIP category breakdown (sums match ZIP_DATA counts) */
var CAT_DATA = {
  '89106': { shelter:20, food:13, cooling:10, water:6,  pets:3 },
  '89101': { shelter:18, food:12, cooling: 9, water:5,  pets:3 },
  '89109': { shelter:10, food: 9, cooling:13, water:6,  pets:3 },
  '89104': { shelter:12, food:10, cooling: 8, water:5,  pets:3 },
  '89119': { shelter: 8, food:10, cooling:11, water:4,  pets:2 },
  '89102': { shelter: 9, food: 9, cooling: 7, water:4,  pets:2 },
  '89107': { shelter: 7, food: 8, cooling: 7, water:5,  pets:2 },
  '89121': { shelter: 6, food: 7, cooling: 7, water:4,  pets:2 },
  '89108': { shelter: 6, food: 7, cooling: 5, water:3,  pets:1 },
  '89110': { shelter: 4, food: 5, cooling: 5, water:3,  pets:1 },
  '89115': { shelter: 3, food: 4, cooling: 4, water:2,  pets:1 },
  '89146': { shelter: 3, food: 3, cooling: 4, water:2,  pets:0 },
  '89128': { shelter: 2, food: 3, cooling: 2, water:1,  pets:1 },
  '89004': { shelter: 1, food: 2, cooling: 2, water:2,  pets:1 }
};

var MAP_POS = {
  '89101':{ x:298, y:195 }, '89106':{ x:253, y:172 }, '89109':{ x:258, y:248 },
  '89104':{ x:348, y:202 }, '89119':{ x:300, y:310 }, '89102':{ x:220, y:228 },
  '89107':{ x:196, y:168 }, '89121':{ x:405, y:316 }, '89108':{ x:286, y:115 },
  '89110':{ x:452, y:232 }, '89115':{ x:420, y:108 }, '89146':{ x:128, y:242 },
  '89128':{ x: 55, y:165 }, '89004':{ x: 40, y:355 }
};

var CATS = [
  { key:'shelter', label:'Shelters', icon:'🏠' },
  { key:'food',    label:'Food',     icon:'🍽️' },
  { key:'cooling', label:'Cooling',  icon:'❄️' },
  { key:'water',   label:'Water',    icon:'💧' },
  { key:'pets',    label:'Pets',     icon:'🐾' }
];

var currentFilter = 'all';
var dotEls = {};
var mapBuilt = false;

/* ── Auth ────────────────────────────────────────────────────────────────── */
document.getElementById('pw-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') tryLogin();
});

function tryLogin() {
  var inp = document.getElementById('pw-input');
  var err = document.getElementById('login-error');
  if (inp.value === 'hope702miguel') {
    document.getElementById('login-screen').style.display = 'none';
    var dash = document.getElementById('dashboard');
    dash.classList.add('visible');
    if (!dash._built) { dash._built = true; initDashboard(); }
  } else {
    inp.classList.remove('shake');
    void inp.offsetWidth;
    inp.classList.add('shake');
    err.textContent = 'Incorrect password.';
    setTimeout(function() { inp.classList.remove('shake'); }, 400);
  }
}

function logout() {
  document.getElementById('dashboard').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  document.getElementById('login-error').textContent = '';
}

/* ── Filter ──────────────────────────────────────────────────────────────── */
function setFilter(key, btn) {
  currentFilter = key;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    b.classList.remove('active');
  });
  btn.classList.add('active');
  refresh();
}

function countFor(zip) {
  var d = CAT_DATA[zip];
  if (!d) return 0;
  if (currentFilter === 'all') {
    return d.shelter + d.food + d.cooling + d.water + d.pets;
  }
  return d[currentFilter] || 0;
}

/* ── Init ────────────────────────────────────────────────────────────────── */
function initDashboard() {
  document.getElementById('hdr-date').textContent =
    new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  buildMap();
  refresh();
}

function refresh() {
  var counts = {};
  var total = 0;
  ZIP_DATA.forEach(function(d) {
    var c = countFor(d.zip);
    counts[d.zip] = c;
    total += c;
  });

  updateStats(counts, total);
  updateMapDots(counts);
  buildZipList(counts, total);
  buildCatChart();
}

/* ── Stats ───────────────────────────────────────────────────────────────── */
function updateStats(counts, total) {
  /* Total texts */
  document.getElementById('s-total').textContent = total;
  if (currentFilter === 'all') {
    document.getElementById('s-total-note').textContent = 'across all categories';
  } else {
    var cat = CATS.find(function(c) { return c.key === currentFilter; });
    document.getElementById('s-total-note').textContent = cat.label + ' requests';
  }

  /* Active ZIPs */
  var active = ZIP_DATA.filter(function(d) { return counts[d.zip] > 0; }).length;
  document.getElementById('s-zips').textContent = active;

  /* Top resource */
  var catTotals = {};
  CATS.forEach(function(c) {
    catTotals[c.key] = ZIP_DATA.reduce(function(s, d) {
      return s + (CAT_DATA[d.zip] ? CAT_DATA[d.zip][c.key] || 0 : 0);
    }, 0);
  });
  var topCat = CATS.reduce(function(best, c) {
    return catTotals[c.key] > catTotals[best.key] ? c : best;
  });
  document.getElementById('s-top-res').textContent = topCat.icon + ' ' + topCat.label;
  document.getElementById('s-top-res-note').textContent = catTotals[topCat.key] + ' total requests';

  /* Hottest ZIP */
  var sorted = ZIP_DATA.slice().sort(function(a, b) {
    return counts[b.zip] - counts[a.zip];
  });
  var hot = sorted[0];
  document.getElementById('s-hot-zip').textContent = hot.zip;
  document.getElementById('s-hot-note').textContent =
    hot.nbhd + ' · ' + counts[hot.zip] + ' req';
}

/* ── SVG map ─────────────────────────────────────────────────────────────── */
function svgEl(tag, attrs) {
  var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.keys(attrs).forEach(function(k) { el.setAttribute(k, attrs[k]); });
  return el;
}

function buildMap() {
  if (mapBuilt) return;
  mapBuilt = true;

  var svg  = document.getElementById('map-svg');
  var wrap = document.getElementById('map-wrap');
  var tip  = document.getElementById('map-tip');

  /* Background */
  svg.appendChild(svgEl('rect', { width:500, height:380, fill:'#141F38', rx:8 }));

  /* Grid */
  [100,200,300,400].forEach(function(x) {
    svg.appendChild(svgEl('line', {
      x1:x, y1:0, x2:x, y2:380, stroke:'rgba(255,255,255,0.04)', 'stroke-width':1
    }));
  });
  [76,152,228,304].forEach(function(y) {
    svg.appendChild(svgEl('line', {
      x1:0, y1:y, x2:500, y2:y, stroke:'rgba(255,255,255,0.04)', 'stroke-width':1
    }));
  });

  /* Roads */
  function road(x1,y1,x2,y2) {
    svg.appendChild(svgEl('line', {
      x1:x1,y1:y1,x2:x2,y2:y2, stroke:'rgba(255,255,255,0.07)', 'stroke-width':1
    }));
  }
  function roadLbl(x, y, label) {
    var t = svgEl('text', {
      x:x, y:y, 'font-size':7, fill:'rgba(255,255,255,0.13)',
      'text-anchor':'start', 'font-style':'italic', style:'pointer-events:none'
    });
    t.textContent = label;
    svg.appendChild(t);
  }
  road(252, 0, 252, 380); roadLbl(255, 18, 'Las Vegas Blvd / Strip');
  road(0, 155, 500, 155); roadLbl(4, 153, 'Charleston Blvd');
  road(0, 192, 500, 192); roadLbl(4, 190, 'Sahara Ave');
  road(0, 240, 500, 240); roadLbl(4, 238, 'Flamingo Rd');
  road(0, 275, 500, 275); roadLbl(4, 273, 'Tropicana Ave');

  /* Compass */
  var nT = svgEl('text', {
    x:480, y:22, 'font-size':10, fill:'#243456', 'text-anchor':'middle'
  });
  nT.textContent = 'N';
  svg.appendChild(nT);
  svg.appendChild(svgEl('line', {
    x1:480, y1:26, x2:480, y2:34, stroke:'#243456', 'stroke-width':1.5
  }));

  /* Dots — one group per ZIP */
  ZIP_DATA.forEach(function(d) {
    var pos = MAP_POS[d.zip];
    var g = svgEl('g', { style:'cursor:pointer' });

    /* Hover ring */
    var ring = svgEl('circle', {
      cx:pos.x, cy:pos.y, r:0, fill:'none',
      stroke:'#F5C842', 'stroke-width':1.5, opacity:0, style:'display:none'
    });

    /* Glow for hottest (animated with SVG SMIL) */
    var glow = svgEl('circle', {
      cx:pos.x, cy:pos.y, r:0, fill:'none',
      stroke:'#F5C842', 'stroke-width':2, opacity:0
    });
    /* SMIL animation on glow */
    var animR = svgEl('animate', {
      attributeName:'r', values:'0;0;0',
      dur:'2s', repeatCount:'indefinite'
    });
    var animO = svgEl('animate', {
      attributeName:'opacity', values:'0;0;0',
      dur:'2s', repeatCount:'indefinite'
    });
    glow.appendChild(animR);
    glow.appendChild(animO);

    /* Main dot */
    var dot = svgEl('circle', {
      cx:pos.x, cy:pos.y, r:5,
      fill:'#E5A100', opacity:0.2
    });

    /* Count label */
    var cntLbl = svgEl('text', {
      x:pos.x, y:String(pos.y + 1),
      'font-size':8, fill:'#141F38',
      'text-anchor':'middle', 'dominant-baseline':'middle',
      'font-weight':700, style:'pointer-events:none'
    });

    /* ZIP label below dot */
    var zipLbl = svgEl('text', {
      x:pos.x, y:String(pos.y + 20),
      'font-size':8, fill:'#8E9BB5',
      'text-anchor':'middle', style:'pointer-events:none'
    });
    zipLbl.textContent = d.zip;

    g.appendChild(glow);
    g.appendChild(ring);
    g.appendChild(dot);
    g.appendChild(cntLbl);
    g.appendChild(zipLbl);
    svg.appendChild(g);

    dotEls[d.zip] = { g:g, dot:dot, ring:ring, glow:glow,
                      cntLbl:cntLbl, zipLbl:zipLbl,
                      animR:animR, animO:animO };

    /* Hover events */
    g.addEventListener('mouseenter', function() {
      var cnt = parseInt(dot.getAttribute('data-count'), 10) || 0;
      document.getElementById('tip-zip').textContent   = d.zip;
      document.getElementById('tip-nbhd').textContent  = d.nbhd;
      document.getElementById('tip-count').textContent = cnt + ' texts';
      var lbl = currentFilter === 'all' ? 'all categories' :
        CATS.find(function(c) { return c.key === currentFilter; }).label;
      document.getElementById('tip-sub').textContent = lbl;
      ring.style.display = '';
    });
    g.addEventListener('mousemove', function(e) {
      var rect = wrap.getBoundingClientRect();
      tip.style.display = 'block';
      tip.style.left    = (e.clientX - rect.left) + 'px';
      tip.style.top     = (e.clientY - rect.top)  + 'px';
    });
    g.addEventListener('mouseleave', function() {
      tip.style.display  = 'none';
      ring.style.display = 'none';
    });
  });
}

function updateMapDots(counts) {
  var maxCount = 0;
  ZIP_DATA.forEach(function(d) {
    if (counts[d.zip] > maxCount) maxCount = counts[d.zip];
  });
  if (maxCount === 0) maxCount = 1;

  ZIP_DATA.forEach(function(d) {
    var els = dotEls[d.zip];
    if (!els) return;
    var cnt   = counts[d.zip] || 0;
    var ratio = cnt / maxCount;
    var r     = cnt > 0 ? 5 + Math.sqrt(cnt) * 1.7 : 4;
    var op    = cnt > 0 ? 0.45 + ratio * 0.55 : 0.15;
    var isHot = cnt === maxCount && cnt > 0;

    els.dot.setAttribute('r', r);
    els.dot.setAttribute('opacity', op);
    els.dot.setAttribute('fill', cnt > 0 ? '#E5A100' : '#243456');
    els.dot.setAttribute('data-count', cnt);

    els.cntLbl.textContent = cnt > 0 ? String(cnt) : '';
    els.cntLbl.setAttribute('y', String(MAP_POS[d.zip].y + 1));

    var rStr  = isHot ? String(r + 8)  + ';' + String(r + 16) + ';' + String(r + 8)  : '0;0;0';
    var opStr = isHot ? '0.7;0.1;0.7' : '0;0;0';
    els.animR.setAttribute('values', rStr);
    els.animO.setAttribute('values', opStr);

    els.ring.setAttribute('r', r + 5);
    els.zipLbl.setAttribute('y', String(MAP_POS[d.zip].y + r + 13));
  });
}

/* ── ZIP progress bar list ───────────────────────────────────────────────── */
function buildZipList(counts, total) {
  var container = document.getElementById('zip-list');
  container.innerHTML = '';

  var sorted = ZIP_DATA.slice().sort(function(a, b) {
    return counts[b.zip] - counts[a.zip];
  });
  var maxCnt = counts[sorted[0].zip] || 1;

  sorted.forEach(function(d, i) {
    var cnt = counts[d.zip] || 0;
    var pct = Math.round((cnt / maxCnt) * 100);

    var row    = document.createElement('div');
    row.className = 'zip-row';

    var rank   = document.createElement('div');
    rank.className = 'zip-rank';
    rank.textContent = '#' + (i + 1);

    var code   = document.createElement('div');
    code.className = 'zip-code';
    code.textContent = d.zip;

    var wrap   = document.createElement('div');
    wrap.className = 'zip-bar-wrap';
    var fill   = document.createElement('div');
    fill.className = 'zip-bar-fill';
    fill.style.width = '0%';
    fill.style.opacity = cnt > 0 ? '1' : '0.2';
    wrap.appendChild(fill);

    var nbhd   = document.createElement('div');
    nbhd.className = 'zip-nbhd';
    nbhd.textContent = d.nbhd;

    var countEl = document.createElement('div');
    countEl.className = 'zip-count';
    countEl.textContent = cnt;

    row.appendChild(rank);
    row.appendChild(code);
    row.appendChild(wrap);
    row.appendChild(nbhd);
    row.appendChild(countEl);
    container.appendChild(row);

    setTimeout(function() { fill.style.width = pct + '%'; }, 60);
  });
}

/* ── Category bar chart ──────────────────────────────────────────────────── */
function buildCatChart() {
  var container = document.getElementById('cat-list');
  container.innerHTML = '';

  var catTotals = {};
  CATS.forEach(function(c) {
    catTotals[c.key] = ZIP_DATA.reduce(function(s, d) {
      return s + (CAT_DATA[d.zip] ? CAT_DATA[d.zip][c.key] || 0 : 0);
    }, 0);
  });
  var grandTotal = CATS.reduce(function(s, c) { return s + catTotals[c.key]; }, 0);
  var maxVal = CATS.reduce(function(m, c) {
    return catTotals[c.key] > m ? catTotals[c.key] : m;
  }, 1);

  CATS.forEach(function(c) {
    var val   = catTotals[c.key];
    var pct   = Math.round((val / maxVal) * 100);
    var share = grandTotal > 0 ? Math.round((val / grandTotal) * 100) : 0;
    var isSel = currentFilter === c.key;

    var row   = document.createElement('div');
    row.className = 'cat-row';

    var icon  = document.createElement('div');
    icon.className = 'cat-icon';
    icon.textContent = c.icon;

    var label = document.createElement('div');
    label.className = 'cat-label';
    label.textContent = c.label;
    if (isSel) { label.style.color = '#F5C842'; label.style.fontWeight = '800'; }

    var bWrap = document.createElement('div');
    bWrap.className = 'cat-bar-wrap';
    var bFill = document.createElement('div');
    bFill.className = 'cat-bar-fill';
    bFill.style.width = '0%';
    if (isSel) {
      bFill.style.background = 'linear-gradient(to right, #E5A100, #F5C842)';
    }
    bWrap.appendChild(bFill);

    var cntEl = document.createElement('div');
    cntEl.className = 'cat-count';
    cntEl.textContent = val;
    if (isSel) cntEl.style.color = '#F5C842';

    var pctEl = document.createElement('div');
    pctEl.className = 'cat-pct';
    pctEl.textContent = share + '%';

    row.appendChild(icon);
    row.appendChild(label);
    row.appendChild(bWrap);
    row.appendChild(cntEl);
    row.appendChild(pctEl);
    container.appendChild(row);

    setTimeout(function() { bFill.style.width = pct + '%'; }, 60);
  });
}
</script>
